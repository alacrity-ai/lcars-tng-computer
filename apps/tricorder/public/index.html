<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>Tricorder</title>
<meta name="theme-color" content="#000000">
<link rel="manifest" href="/manifest.webmanifest">
<link rel="icon" href="/icons/icon-192.png">
<link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Tricorder">
<style>
  :root {
    --gold: #FF9900; --peach: #FFCC99; --lav: #CC99CC; --blue: #9999CC; --red: #CC6666;
    --bg: #000; --ink: #000; --panel: #0d0b07;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; height: 100%; }
  body {
    background: var(--bg); color: var(--gold);
    font-family: Antonio, "Avenir Next Condensed", "Arial Narrow", "Helvetica Neue", sans-serif;
    letter-spacing: .04em;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    user-select: none; -webkit-user-select: none;
  }
  #app { max-width: 480px; margin: 0 auto; padding: 12px 16px 24px; min-height: 100%; display: flex; flex-direction: column; }

  /* LCARS header bar — segments double as status lights */
  .lcars-bar { display: flex; align-items: stretch; gap: 6px; height: 44px; margin-bottom: 18px; }
  .lcars-cap { background: var(--gold); width: 56px; border-radius: 22px 0 0 22px; }
  .lcars-title { flex: 1; display: flex; align-items: center; justify-content: flex-end;
    background: var(--gold); color: var(--ink); padding: 0 14px; font-size: 22px; font-weight: 700; }
  .lcars-seg { width: 34px; background: var(--lav); animation: statlight 5.2s steps(1) infinite; }
  .lcars-seg2 { width: 18px; background: var(--blue); border-radius: 0 22px 22px 0; animation: statlight 7.6s steps(1) infinite reverse; }
  @keyframes statlight {
    0%, 34%, 41%, 100% { filter: brightness(1); }
    35%, 40% { filter: brightness(.55); }
    72%, 74% { filter: brightness(1.35); }
  }

  .view { display: none; flex: 1; flex-direction: column; }
  .view.active { display: flex; animation: fade-rise .26s ease-out; }
  @keyframes fade-rise { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }

  label { display: block; color: var(--blue); font-size: 13px; margin: 12px 0 4px; text-transform: uppercase; }
  input, select {
    width: 100%; background: #111; border: 1px solid #333; border-radius: 8px;
    color: #fff; font: inherit; font-size: 17px; padding: 12px 14px; outline: none;
    user-select: text; -webkit-user-select: text;
    transition: border-color .18s, box-shadow .18s;
  }
  input:focus { border-color: var(--gold); box-shadow: 0 0 0 1px var(--gold) inset; }

  .btn {
    display: block; width: 100%; border: 0; border-radius: 22px; padding: 13px;
    font: inherit; font-size: 17px; font-weight: 700; text-transform: uppercase;
    background: var(--gold); color: var(--ink); margin-top: 16px; cursor: pointer;
    transition: transform .1s ease-out, filter .12s;
  }
  .btn:active { filter: brightness(1.15); transform: scale(.97); }
  .btn.small { width: auto; display: inline-block; padding: 7px 16px; font-size: 13px; margin: 4px 6px 0 0; border-radius: 14px; }
  .btn.lav { background: var(--lav); } .btn.blue { background: var(--blue); } .btn.red { background: var(--red); }
  .btn[disabled] { opacity: .4; }

  .err { color: var(--red); min-height: 20px; font-size: 15px; margin-top: 12px; }

  /* main view: Okudagram data rail down the left edge */
  .main-cols { flex: 1; display: flex; gap: 12px; min-height: 0; }
  .rail { width: 46px; flex: none; display: flex; flex-direction: column; gap: 6px; padding-bottom: 4px; }
  .rail-seg { border-radius: 10px; min-height: 22px; }
  .rail-seg.gold { background: var(--gold); flex: 2; border-radius: 10px 10px 4px 4px; }
  .rail-seg.lav { background: var(--lav); flex: 1; }
  .rail-seg.blue { background: var(--blue); flex: 3; }
  .rail-seg.peach { background: var(--peach); flex: 1; border-radius: 4px 4px 14px 14px; }
  .rail-readout {
    color: var(--peach); font-size: 10px; text-align: right; padding: 1px 3px;
    font-variant-numeric: tabular-nums; letter-spacing: .08em; opacity: .8; min-height: 13px;
  }
  .main-body { flex: 1; display: flex; flex-direction: column; min-width: 0; }

  /* status strip */
  .strip { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .who { color: var(--lav); font-size: 15px; text-transform: uppercase; }
  .pills { display: flex; gap: 8px; }
  .pill { font-size: 13px; font-weight: 700; padding: 5px 14px; border-radius: 12px; color: var(--ink); background: #555; text-transform: uppercase; transition: background .25s; }
  .pill.on  { background: var(--gold); }
  .pill.off { background: var(--red); }
  .pill.q   { background: var(--lav); }
  @keyframes pill-pop { 0% { transform: scale(.7); } 60% { transform: scale(1.12); } 100% { transform: scale(1); } }

  /* push to talk — the instrument */
  .ptt-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 260px; }
  .ptt-holder { position: relative; width: 190px; height: 190px; }
  .ring {
    position: absolute; inset: -16px; border-radius: 50%; pointer-events: none;
    background: conic-gradient(
      var(--gold) 0 12deg, transparent 12deg 26deg,
      var(--lav) 26deg 34deg, transparent 34deg 88deg,
      var(--gold) 88deg 132deg, transparent 132deg 148deg,
      var(--blue) 148deg 157deg, transparent 157deg 205deg,
      var(--gold) 205deg 262deg, transparent 262deg 276deg,
      var(--peach) 276deg 286deg, transparent 286deg 360deg);
    -webkit-mask: radial-gradient(closest-side, transparent calc(100% - 7px), #000 calc(100% - 6px));
    mask: radial-gradient(closest-side, transparent calc(100% - 7px), #000 calc(100% - 6px));
    animation: sweep 26s linear infinite; opacity: .45;
    transition: opacity .3s;
  }
  .ptt-holder.listening .ring { animation-duration: 2.4s; opacity: 1; }
  .ptt-holder.send .ring { opacity: .85; animation-play-state: paused; }
  @keyframes sweep { to { transform: rotate(360deg); } }
  .pulse {
    position: absolute; inset: -16px; border-radius: 50%; pointer-events: none;
    border: 2px solid var(--gold); opacity: 0;
  }
  .ptt-holder.listening .pulse { animation: pulse-out 1.8s ease-out infinite; }
  .ptt-holder.listening .pulse.p2 { animation-delay: .9s; }
  @keyframes pulse-out { 0% { transform: scale(.94); opacity: .65; } 100% { transform: scale(1.28); opacity: 0; } }

  #ptt {
    width: 190px; height: 190px; border-radius: 50%; border: 6px solid var(--gold);
    background: #180f00; color: var(--gold); font: inherit; font-size: 19px; font-weight: 700;
    text-transform: uppercase; cursor: pointer;
    touch-action: none; -webkit-touch-callout: none;
    transition: background .15s, color .15s, border-color .15s, transform .1s ease-out;
  }
  #ptt:active { transform: scale(.97); }
  #ptt.listening { background: var(--gold); color: var(--ink); box-shadow: 0 0 44px rgba(255,153,0,.55); }
  #ptt.send { background: var(--gold); color: var(--ink); border-color: #fff; }
  #ptt[disabled] { border-color: #444; color: #666; background: #0a0a0a; }
  /* Cancel sits well clear of the SEND circle (diagonally out, top-right) and
     slides out from behind it LCARS-style: quick, with a slight overshoot. */
  #ptt-cancel {
    position: absolute; top: -22px; right: -46px; width: 62px; height: 62px;
    border-radius: 50%; border: 3px solid var(--ink); background: var(--red); color: var(--ink);
    font: inherit; font-size: 26px; font-weight: 700; cursor: pointer;
    opacity: 0; pointer-events: none;
    transform: translate(-52px, 52px) scale(.4);
    transition: transform .28s cubic-bezier(.2, 1.5, .4, 1), opacity .18s ease-out;
  }
  #ptt-cancel.show {
    opacity: 1; pointer-events: auto;
    transform: translate(0, 0) scale(1);
  }
  #live { min-height: 44px; margin-top: 18px; color: #fff; font-size: 16px; text-align: center; padding: 0 8px; }
  #live .caret {
    display: inline-block; width: 3px; height: 1em; background: var(--gold);
    margin-left: 4px; vertical-align: -2px; animation: caret-blink 1s steps(1) infinite;
  }
  @keyframes caret-blink { 50% { opacity: 0; } }
  #toast {
    min-height: 22px; font-size: 14px; text-align: center; color: var(--blue);
    opacity: 0; transform: translateY(6px); transition: opacity .25s, transform .25s;
  }
  #toast.visible { opacity: 1; transform: none; }
  #toast.bad { color: var(--red); }

  /* instant-send toggle */
  .toggle-row { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; }
  .toggle-label { color: var(--blue); font-size: 13px; text-transform: uppercase; }
  .switch {
    width: 64px; height: 30px; border-radius: 15px; background: #222; border: 2px solid #555;
    position: relative; cursor: pointer; padding: 0; flex: none;
    transition: background .2s, border-color .2s;
  }
  .switch .knob {
    position: absolute; top: 2px; left: 2px; width: 22px; height: 22px; border-radius: 50%;
    background: #888; transition: left .2s cubic-bezier(.2, 1.3, .4, 1), background .2s;
  }
  .switch.on { background: var(--gold); border-color: var(--gold); }
  .switch.on .knob { left: 36px; background: var(--ink); }

  .typerow { display: flex; gap: 8px; margin-top: 6px; }
  .typerow input { flex: 1; }
  .typerow .btn { width: auto; margin: 0; padding: 12px 20px; }

  .foot { display: flex; justify-content: space-between; margin-top: 22px; }
  .link { background: none; border: 0; color: var(--blue); font: inherit; font-size: 14px; text-transform: uppercase; cursor: pointer; padding: 6px 0; transition: color .15s; }
  .link:active { color: var(--peach); }

  /* admin */
  .card { border: 1px solid #2a2a2a; border-radius: 12px; padding: 12px 14px; margin-top: 12px; background: var(--panel); animation: fade-rise .22s ease-out both; }
  .card h3 { margin: 0; font-size: 17px; color: var(--gold); text-transform: uppercase; display: flex; justify-content: space-between; align-items: baseline; }
  .card h3 .role { color: var(--lav); font-size: 12px; }
  .sess { font-size: 13px; color: #bbb; margin-top: 6px; display: flex; justify-content: space-between; align-items: center; gap: 8px; }
  .sess button { background: none; border: 1px solid var(--red); color: var(--red); border-radius: 10px; font: inherit; font-size: 11px; padding: 2px 10px; cursor: pointer; }
  .muted { color: #777; font-size: 13px; margin-top: 6px; }
  .dis { opacity: .5; }

  /* modal */
  #modal { position: fixed; inset: 0; background: rgba(0,0,0,.85); display: none; align-items: center; justify-content: center; padding: 24px; }
  #modal.open { display: flex; }
  .modal-box {
    background: #120b00; border: 2px solid var(--gold); border-radius: 16px; padding: 24px;
    text-align: center; max-width: 340px;
    animation: modal-pop .3s cubic-bezier(.2, 1.4, .4, 1);
  }
  @keyframes modal-pop { from { transform: scale(.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .modal-box .pw { font-size: 30px; color: #fff; margin: 16px 0; word-break: break-all; user-select: text; -webkit-user-select: text; }
  .modal-box .note { color: var(--blue); font-size: 14px; }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation: none !important; transition: none !important; }
  }
</style>
</head>
<body>
<div id="app">
  <div class="lcars-bar">
    <div class="lcars-cap"></div>
    <div class="lcars-title">TRICORDER</div>
    <div class="lcars-seg"></div>
    <div class="lcars-seg2"></div>
  </div>

  <!-- LOGIN -->
  <div class="view" id="view-login">
    <label>Handle</label>
    <input id="in-handle" autocapitalize="none" autocomplete="username" spellcheck="false">
    <label>Password</label>
    <input id="in-password" type="password" autocomplete="current-password">
    <label>This device</label>
    <input id="in-device" maxlength="40">
    <button class="btn" id="btn-login">Log in</button>
    <div class="err" id="login-err"></div>
  </div>

  <!-- MAIN -->
  <div class="view" id="view-main">
    <div class="main-cols">
      <aside class="rail" aria-hidden="true">
        <div class="rail-seg gold"></div>
        <div class="rail-readout" id="ro-1">47.2</div>
        <div class="rail-seg lav"></div>
        <div class="rail-readout" id="ro-2">1701</div>
        <div class="rail-seg blue"></div>
        <div class="rail-readout" id="ro-3">003.9</div>
        <div class="rail-seg peach"></div>
      </aside>
      <div class="main-body">
        <div class="strip">
          <div class="who" id="who"></div>
          <div class="pills">
            <div class="pill q" id="qpill" hidden></div>
            <div class="pill" id="pill">…</div>
          </div>
        </div>
        <div class="ptt-wrap">
          <div class="ptt-holder" id="holder">
            <div class="ring"></div>
            <div class="pulse p1"></div>
            <div class="pulse p2"></div>
            <button id="ptt">Hold<br>to talk</button>
            <button id="ptt-cancel">&#10005;</button>
          </div>
          <div id="live"></div>
          <div id="toast"></div>
        </div>
        <div class="toggle-row">
          <span class="toggle-label">Instant send on release</span>
          <button class="switch" id="sw-instant" aria-label="Instant send on release"><span class="knob"></span></button>
        </div>
        <label>Or type a command</label>
        <div class="typerow">
          <input id="in-type" placeholder="Computer, …" autocapitalize="sentences">
          <button class="btn" id="btn-send">Send</button>
        </div>
        <div class="foot">
          <button class="link" id="btn-admin" hidden>Admin console</button>
          <button class="link" id="btn-logout">Log out</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ADMIN -->
  <div class="view" id="view-admin">
    <button class="link" id="btn-back" style="text-align:left">&#9664; Back</button>
    <button class="btn lav" id="btn-rotate">Rotate guest password</button>
    <div id="admin-users"></div>
    <div class="card">
      <h3>New user</h3>
      <label>Handle</label><input id="nu-handle" autocapitalize="none" spellcheck="false">
      <label>Name</label><input id="nu-name">
      <label>Role</label>
      <select id="nu-role"><option value="member">member</option><option value="guest">guest</option><option value="admin">admin</option></select>
      <label>Password</label><input id="nu-password" type="password" autocomplete="new-password">
      <button class="btn blue" id="btn-create">Create user</button>
    </div>
    <div class="err" id="admin-err"></div>
  </div>
</div>

<div id="modal">
  <div class="modal-box">
    <div style="color:var(--gold);text-transform:uppercase;font-weight:700">New guest password</div>
    <div class="pw" id="modal-pw"></div>
    <div class="note">Shown once — all previous guest sessions are revoked.</div>
    <button class="btn" id="btn-modal-close">Done</button>
  </div>
</div>

<script>
"use strict";
const $ = (id) => document.getElementById(id);
const store = {
  get token() { return localStorage.getItem("tricorder.token"); },
  set token(v) { v ? localStorage.setItem("tricorder.token", v) : localStorage.removeItem("tricorder.token"); },
  get user() { try { return JSON.parse(localStorage.getItem("tricorder.user")); } catch { return null; } },
  set user(v) { v ? localStorage.setItem("tricorder.user", JSON.stringify(v)) : localStorage.removeItem("tricorder.user"); },
};

let me = null; // {user:{handle,name,role}, deviceLabel}

function show(view) {
  for (const v of document.querySelectorAll(".view")) v.classList.remove("active");
  $("view-" + view).classList.add("active");
}

async function api(path, opts = {}) {
  const res = await fetch(path, {
    ...opts,
    headers: {
      ...(opts.body ? { "content-type": "application/json" } : {}),
      ...(store.token ? { authorization: "Bearer " + store.token } : {}),
      ...(opts.headers || {}),
    },
  });
  if (res.status === 401 && path !== "/api/login") { logout(); throw new Error("session expired — log in again"); }
  const data = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(data.error || ("request failed (" + res.status + ")"));
  return data;
}

function logout() {
  store.token = null; store.user = null; me = null;
  stopPolling();
  stopReadouts();
  show("login");
}

// ---- login ------------------------------------------------------------------
function guessDevice() {
  const ua = navigator.userAgent;
  const kind = /iPad/.test(ua) ? "iPad" : /iPhone/.test(ua) ? "iPhone" : /Android/.test(ua) ? "Android"
    : /Mac/.test(ua) ? "Mac" : /Windows/.test(ua) ? "PC" : "Device";
  return kind;
}

$("btn-login").onclick = async () => {
  $("login-err").textContent = "";
  try {
    const data = await api("/api/login", {
      method: "POST",
      body: JSON.stringify({
        handle: $("in-handle").value.trim(),
        password: $("in-password").value,
        deviceLabel: $("in-device").value.trim() || guessDevice(),
      }),
    });
    store.token = data.token;
    store.user = data.user;
    $("in-password").value = "";
    enterMain({ user: data.user, deviceLabel: data.deviceLabel });
  } catch (e) {
    $("login-err").textContent = e.message;
  }
};
$("in-password").addEventListener("keydown", (e) => { if (e.key === "Enter") $("btn-login").click(); });

// ---- main -------------------------------------------------------------------
function enterMain(identity) {
  me = identity;
  $("who").textContent = identity.user.handle + " @ " + identity.deviceLabel;
  $("btn-admin").hidden = identity.user.role !== "admin";
  show("main");
  startPolling();
  startReadouts();
}

// Adaptive poll: 15s at rest, 2s while commands are pending on the Computer
// (or just after a send, so the queue badge appears without waiting a cycle).
let pollTimer = null, fastUntil = 0, lastPending = 0;
async function pollStatus() {
  try {
    const s = await api("/api/status");
    setPill(s.online, s.pending || 0);
  } catch { /* 401 already handled; network blips keep last state */ }
}
function setPill(online, pending) {
  const pill = $("pill");
  pill.textContent = online ? "Computer online" : "Computer offline";
  pill.className = "pill " + (online ? "on" : "off");
  const q = $("qpill");
  q.hidden = !(pending > 0);
  if (pending > 0) {
    q.textContent = "Queue " + pending;
    if (pending !== lastPending) {
      q.style.animation = "none";
      void q.offsetWidth;
      q.style.animation = "pill-pop .3s cubic-bezier(.2,1.4,.4,1)";
    }
    fastUntil = Math.max(fastUntil, Date.now() + 10000);
  }
  lastPending = pending;
  schedulePoll();
}
function schedulePoll() {
  if (!me) return;
  if (pollTimer) clearTimeout(pollTimer);
  pollTimer = setTimeout(async () => { await pollStatus(); schedulePoll(); },
    Date.now() < fastUntil ? 2000 : 15000);
}
function startPolling() { stopPolling(); pollStatus(); schedulePoll(); }
function stopPolling() { if (pollTimer) { clearTimeout(pollTimer); pollTimer = null; } }
document.addEventListener("visibilitychange", () => { if (!document.hidden && me) pollStatus(); });

// ---- Okudagram rail readouts ---------------------------------------------------
const reducedMotion = matchMedia("(prefers-reduced-motion: reduce)");
let roTimer = null;
const roFmt = [
  () => (40 + Math.random() * 59).toFixed(1),
  () => String(1000 + Math.floor(Math.random() * 9000)),
  () => "0" + (Math.random() * 9).toFixed(1).padStart(4, "0"),
];
function startReadouts() {
  if (roTimer || reducedMotion.matches) return;
  roTimer = setInterval(() => {
    if (document.hidden) return;
    const i = Math.floor(Math.random() * 3);
    $("ro-" + (i + 1)).textContent = roFmt[i]();
  }, 1400);
}
function stopReadouts() { if (roTimer) { clearInterval(roTimer); roTimer = null; } }

// Tricorder chirps: press-to-listen, transmit, discard. Instantiated once and
// rewound per play; all plays happen inside user gestures, so iOS allows them.
const sndPress = new Audio("/sounds/comp_beep.mp3");
const sndSend = new Audio("/sounds/comp_beep_2.mp3");
const sndCancel = new Audio("/sounds/cancel_sound.mp3");
sndPress.preload = "auto";
sndSend.preload = "auto";
sndCancel.preload = "auto";
function chirp(a) {
  try { a.currentTime = 0; a.play().catch(() => {}); } catch {}
}

let toastTimer = null;
function toast(text, bad) {
  const t = $("toast");
  t.textContent = text;
  t.className = bad ? "visible bad" : "visible";
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { t.className = t.className.replace("visible", "").trim(); }, 4000);
}

async function send(text) {
  text = (text || "").trim();
  if (!text) return;
  chirp(sndSend);
  try {
    const r = await api("/api/message", { method: "POST", body: JSON.stringify({ transcript: text }) });
    fastUntil = Date.now() + 30000; // watch for our command landing in the queue
    setPill(r.online, r.pending || 0);
    if (r.online) toast("Transmitted");
    else toast("Computer offline — command not delivered", true);
  } catch (e) {
    toast(e.message, true);
  }
}

$("btn-send").onclick = () => { send($("in-type").value); $("in-type").value = ""; };
$("in-type").addEventListener("keydown", (e) => { if (e.key === "Enter") $("btn-send").click(); });
$("btn-logout").onclick = async () => { try { await api("/api/logout", { method: "POST", body: "{}" }); } catch {} logout(); };
$("btn-admin").onclick = () => { renderAdmin(); show("admin"); };

// ---- push to talk -------------------------------------------------------------
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
const ptt = $("ptt");
const holder = $("holder");
// `committed` carries text across engine auto-restarts while the button is
// held; `runText` is ALWAYS rebuilt from the full result list of the current
// run — some engines (iOS Safari) re-deliver grown copies of earlier results
// on every event, so appending deltas duplicates every prefix.
// Release doesn't send (unless instant-send): it parks the transcript in
// `pendingText` for review — the big button becomes SEND, the ✕ discards.
// Long holds: engines self-terminate on their own schedule, and a reused
// instance goes dead after enough restarts — every restart gets a FRESH
// instance, restarts are slightly delayed, a hard cap parks the transcript
// after 90s, and a safety timer guarantees the button never sticks on
// LISTENING even if the engine swallows its final onend.
let rec = null, held = false, committed = "", runText = "", pendingText = "";
let holdTimer = null, restartTimer = null, safetyTimer = null, finishArmed = false;
const MAX_HOLD_MS = 90_000;

if (!SR) {
  ptt.disabled = true;
  ptt.innerHTML = "Voice<br>unavailable";
  $("live").textContent = "No speech recognition in this browser — type below.";
}

function setLive(text, listening) {
  const live = $("live");
  live.textContent = text;
  if (listening) {
    const c = document.createElement("span");
    c.className = "caret";
    live.appendChild(c);
  }
}

function startRun() {
  rec = new SR();
  rec.lang = navigator.language || "en-US";
  rec.continuous = true;
  rec.interimResults = true;
  rec.onresult = (e) => {
    // Engines disagree about the results list: some replace an interim entry
    // in place, others (iOS Safari) append each grown copy as a NEW entry —
    // ["testing", "testing 1", "testing 1 2"]. Treat an entry that extends
    // (or repeats) the previous one as a replacement, not a new phrase.
    const parts = [];
    for (let i = 0; i < e.results.length; i++) {
      const t = e.results[i][0].transcript.trim();
      if (!t) continue;
      const prev = parts[parts.length - 1];
      const a = t.toLowerCase(), b = prev ? prev.toLowerCase() : null;
      if (prev && a.startsWith(b)) parts[parts.length - 1] = t;
      else if (prev && b.startsWith(a)) { /* shrunk re-send — keep prev */ }
      else parts.push(t);
    }
    runText = parts.join(" ");
    setLive((committed + " " + runText).trim(), true);
  };
  rec.onerror = (e) => {
    if (e.error === "not-allowed" || e.error === "service-not-allowed") {
      held = false;
      clearHoldTimers();
      resetIdle();
      $("live").textContent = "Microphone permission denied — type below.";
    }
    // everything else (no-speech, aborted, network) flows through onend
  };
  rec.onend = () => {
    committed = (committed + " " + runText).trim();
    runText = "";
    if (held) {
      // engine self-terminated mid-hold — re-arm a FRESH instance shortly
      restartTimer = setTimeout(() => {
        if (!held) return;
        try { startRun(); } catch { held = false; armFinish(); finishHold(); }
      }, 120);
      return;
    }
    if (safetyTimer) { clearTimeout(safetyTimer); safetyTimer = null; }
    finishHold();
  };
  rec.start();
}

function clearHoldTimers() {
  if (holdTimer) { clearTimeout(holdTimer); holdTimer = null; }
  if (restartTimer) { clearTimeout(restartTimer); restartTimer = null; }
  if (safetyTimer) { clearTimeout(safetyTimer); safetyTimer = null; }
}

function armFinish() {
  finishArmed = true;
  if (rec) { try { rec.stop(); } catch {} }
  // if the engine never fires its final onend, park anyway
  safetyTimer = setTimeout(finishHold, 900);
}

function finishHold() {
  if (!finishArmed) return;
  finishArmed = false;
  const text = (committed + " " + runText).trim();
  committed = ""; runText = "";
  if (!text) { resetIdle(); return; }
  if (instantSend) { resetIdle(); send(text); }
  else enterPending(text);
}

function beginPTT() {
  if (!SR || held || pendingText) return;
  held = true;
  committed = ""; runText = ""; finishArmed = false;
  holder.classList.add("listening");
  ptt.classList.add("listening");
  ptt.innerHTML = "Listening";
  setLive("", true);
  holdTimer = setTimeout(() => {
    if (!held) return;
    held = false;
    holdTimer = null;
    toast("Maximum hold reached — transcript parked");
    armFinish();
  }, MAX_HOLD_MS);
  try { startRun(); } catch {
    held = false;
    clearHoldTimers();
    resetIdle();
  }
}

function enterPending(text) {
  pendingText = text;
  holder.classList.remove("listening");
  holder.classList.add("send");
  ptt.classList.remove("listening");
  ptt.classList.add("send");
  ptt.innerHTML = "Send";
  $("ptt-cancel").classList.add("show");
  setLive(text, false);
}

function resetIdle() {
  pendingText = "";
  holder.classList.remove("listening", "send");
  ptt.classList.remove("listening", "send");
  ptt.innerHTML = "Hold<br>to talk";
  $("ptt-cancel").classList.remove("show");
  $("live").textContent = "";
}

function endPTT() {
  if (!held) return;
  held = false;
  if (holdTimer) { clearTimeout(holdTimer); holdTimer = null; }
  if (restartTimer) { clearTimeout(restartTimer); restartTimer = null; }
  armFinish();
}

ptt.addEventListener("pointerdown", (e) => {
  e.preventDefault();
  if (pendingText) return; // tap-to-send resolves on pointerup
  chirp(sndPress);
  ptt.setPointerCapture(e.pointerId);
  beginPTT();
});
ptt.addEventListener("pointerup", () => {
  if (pendingText) {
    const t = pendingText;
    resetIdle();
    send(t);
    return;
  }
  endPTT();
});
ptt.addEventListener("pointercancel", () => { if (!pendingText) endPTT(); });
ptt.addEventListener("contextmenu", (e) => e.preventDefault());
$("ptt-cancel").addEventListener("click", () => { chirp(sndCancel); resetIdle(); });

// Instant send: skip the Send/✕ review step and transmit on release.
let instantSend = localStorage.getItem("tricorder.instantSend") === "1";
const sw = $("sw-instant");
function renderSwitch() { sw.classList.toggle("on", instantSend); }
sw.addEventListener("click", () => {
  instantSend = !instantSend;
  localStorage.setItem("tricorder.instantSend", instantSend ? "1" : "0");
  renderSwitch();
});
renderSwitch();

// ---- admin --------------------------------------------------------------------
function fmtAgo(ts) {
  if (!ts) return "never";
  const m = Math.round((Date.now() - ts) / 60000);
  if (m < 1) return "just now";
  if (m < 60) return m + "m ago";
  const h = Math.round(m / 60);
  return h < 48 ? h + "h ago" : Math.round(h / 24) + "d ago";
}

async function renderAdmin() {
  $("admin-err").textContent = "";
  let data;
  try { data = await api("/api/admin/overview"); }
  catch (e) { $("admin-err").textContent = e.message; return; }
  const wrap = $("admin-users");
  wrap.innerHTML = "";
  data.users.forEach((u, idx) => {
    const card = document.createElement("div");
    card.className = "card" + (u.disabled ? " dis" : "");
    card.style.animationDelay = (idx * 40) + "ms";
    const h = document.createElement("h3");
    h.innerHTML = "<span>" + u.handle + (u.disabled ? " (disabled)" : "") + "</span><span class='role'>" + u.role +
      (u.hasPassword ? "" : " · no password") + "</span>";
    card.appendChild(h);
    for (const s of u.sessions) {
      const row = document.createElement("div");
      row.className = "sess";
      const exp = s.expiresAt ? " · expires " + fmtAgo(2 * Date.now() - s.expiresAt).replace(" ago", "") : "";
      row.innerHTML = "<span>" + s.deviceLabel + " · seen " + fmtAgo(s.lastSeenAt || s.createdAt) + exp + "</span>";
      const btn = document.createElement("button");
      btn.textContent = "revoke";
      btn.onclick = async () => { await api("/api/admin/sessions/" + s.id, { method: "DELETE" }); renderAdmin(); };
      row.appendChild(btn);
      card.appendChild(row);
    }
    if (!u.sessions.length) {
      const none = document.createElement("div");
      none.className = "muted";
      none.textContent = "no active sessions";
      card.appendChild(none);
    }
    const actions = document.createElement("div");
    const pwBtn = document.createElement("button");
    pwBtn.className = "btn small blue";
    pwBtn.textContent = "Set password";
    pwBtn.onclick = async () => {
      const pw = prompt("New password for " + u.handle + " (revokes all their sessions):");
      if (!pw) return;
      try { await api("/api/admin/users/" + u.id + "/password", { method: "POST", body: JSON.stringify({ password: pw }) }); renderAdmin(); }
      catch (e) { $("admin-err").textContent = e.message; }
    };
    actions.appendChild(pwBtn);
    if (u.handle !== me.user.handle) {
      const dBtn = document.createElement("button");
      dBtn.className = "btn small " + (u.disabled ? "lav" : "red");
      dBtn.textContent = u.disabled ? "Enable" : "Disable";
      dBtn.onclick = async () => {
        try { await api("/api/admin/users/" + u.id + "/disabled", { method: "POST", body: JSON.stringify({ disabled: !u.disabled }) }); renderAdmin(); }
        catch (e) { $("admin-err").textContent = e.message; }
      };
      actions.appendChild(dBtn);
    }
    card.appendChild(actions);
    wrap.appendChild(card);
  });
}

$("btn-back").onclick = () => show("main");
$("btn-rotate").onclick = async () => {
  if (!confirm("Rotate the guest password? All guest sessions are revoked immediately.")) return;
  try {
    const r = await api("/api/admin/rotate-guest", { method: "POST", body: "{}" });
    $("modal-pw").textContent = r.password;
    $("modal").classList.add("open");
    renderAdmin();
  } catch (e) { $("admin-err").textContent = e.message; }
};
$("btn-create").onclick = async () => {
  $("admin-err").textContent = "";
  try {
    await api("/api/admin/users", {
      method: "POST",
      body: JSON.stringify({
        handle: $("nu-handle").value, name: $("nu-name").value,
        role: $("nu-role").value, password: $("nu-password").value,
      }),
    });
    $("nu-handle").value = $("nu-name").value = $("nu-password").value = "";
    renderAdmin();
  } catch (e) { $("admin-err").textContent = e.message; }
};
$("btn-modal-close").onclick = () => $("modal").classList.remove("open");

// ---- boot ---------------------------------------------------------------------
if ("serviceWorker" in navigator) navigator.serviceWorker.register("/sw.js").catch(() => {});
$("in-device").value = guessDevice();
(async () => {
  if (!store.token) { show("login"); return; }
  try {
    const identity = await api("/api/me");
    enterMain(identity);
  } catch {
    show("login");
  }
})();
</script>
